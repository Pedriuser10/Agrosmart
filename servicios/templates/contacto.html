{% extends 'base.html' %}
{% block title %}Contacto — AgroSmart{% endblock %}
{% block content %}

<section class="page-header">
    <h1>Contáctanos</h1>
    <p>¿Tienes dudas o quieres instalar el sistema en tu predio? Escríbenos.</p>
</section>

<section class="contacto-form">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" placeholder="Tu nombre completo">
        </div>
        <div class="form-group">
            <label>Teléfono / WhatsApp</label>
            <input type="text" name="telefono" placeholder="+56 9 1234 5678">
        </div>
        <div class="form-group">
            <label>Mensaje</label>
            <textarea name="mensaje" rows="5" placeholder="Cuéntanos sobre tu predio..."></textarea>
        </div>
        <button type="submit" class="btn">Enviar mensaje</button>
    </form>
</section>

{% endblock %}
